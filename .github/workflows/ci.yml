name: CI (reusable)

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests & analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ github.repository }}
          SONAR_ORGANIZATION: ${{ github.repository_owner }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=$(echo "$SONAR_PROJECT_KEY" | tr '[:upper:]' '[:lower:]') \
            -Dsonar.organization=$(echo "$SONAR_ORGANIZATION" | tr '[:upper:]' '[:lower:]') \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
